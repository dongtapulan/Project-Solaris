<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solaris 3D Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="font-sans antialiased selection:bg-indigo-500 selection:text-white overflow-hidden">

    <div id="canvas-container"></div>

    <div class="absolute inset-0 pointer-events-none z-10">
        
        <div class="absolute top-0 left-0 p-4 md:p-6 pointer-events-auto">
            <h1 class="text-3xl md:text-5xl font-bold tracking-tighter text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">SOLARIS</h1>
            <p class="text-[10px] md:text-sm text-blue-300 font-mono tracking-widest mt-1 opacity-90 uppercase">System Explorer</p>
        </div>

        <div class="absolute bottom-0 left-0 w-full md:w-auto md:top-28 md:bottom-auto md:left-6 p-4 pointer-events-auto">
            <div id="planet-list-container" class="glass rounded-xl p-2 md:p-3 md:w-72 max-h-[20vh] md:max-h-[65vh] overflow-x-auto md:overflow-x-hidden md:overflow-y-auto shadow-2xl">
                <div id="planet-list" class="flex flex-row md:flex-col gap-1 min-w-max md:min-w-0">
                    </div>
            </div>
        </div>

        <div id="info-panel" class="absolute bottom-24 md:bottom-auto right-4 md:right-6 md:top-28 w-[92%] md:w-80 pointer-events-auto transition-all duration-500 transform translate-y-0 opacity-100">
            <div class="glass rounded-xl p-4 md:p-6 shadow-2xl border-t border-white/10">
                <div class="flex items-center justify-between mb-2 md:mb-3">
                    <h2 id="info-name" class="text-xl md:text-3xl font-bold text-white tracking-tight drop-shadow-md">The Sun</h2>
                    <span id="info-type" class="text-[9px] md:text-[10px] font-bold tracking-wider px-2 py-1 rounded bg-yellow-500/20 text-yellow-200 border border-yellow-500/30">STAR</span> 
                </div>
                
                <p id="info-desc" class="text-gray-300 text-xs md:text-sm leading-relaxed mb-3 md:mb-4 font-light line-clamp-3 md:line-clamp-none"></p>
                
                <div class="grid grid-cols-2 gap-2 md:gap-3 text-[10px] md:text-xs">
                    <div class="bg-black/40 p-2 rounded border border-white/10">
                        <span class="block text-gray-400 mb-1 uppercase tracking-wider text-[8px] md:text-[10px]">Distance</span>
                        <span id="info-dist" class="block text-white font-mono text-xs md:text-sm">-</span>
                    </div>
                    <div class="bg-black/40 p-2 rounded border border-white/10">
                        <span class="block text-gray-400 mb-1 uppercase tracking-wider text-[8px] md:text-[10px]">Orbit</span>
                        <span id="info-year" class="block text-white font-mono text-xs md:text-sm">-</span>
                    </div>
                </div>
                
                <button id="reset-cam" class="mt-4 md:mt-5 w-full bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-100 py-2 rounded border border-indigo-500/30 transition-colors text-[10px] uppercase tracking-widest font-semibold">
                    Reset Overview
                </button>
            </div>
        </div>

    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
