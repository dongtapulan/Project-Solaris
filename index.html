<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020205">
    <title>Space.env | Solar System Explorer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body class="antialiased selection:bg-indigo-500/30 selection:text-white overflow-hidden">

    <div id="canvas-container"></div>

    <div class="absolute inset-0 pointer-events-none z-10">
        
        <div class="absolute top-0 left-0 p-8 pointer-events-auto">
            <h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-white drop-shadow-lg">Space.env</h1>
            <p class="text-[10px] md:text-xs text-blue-400 font-mono tracking-[0.4em] mt-2 opacity-80 uppercase">Universal Telemetry Sync</p>
        </div>

        <div id="telemetry-hud" class="pointer-events-auto">
            <div class="flex flex-col gap-3">
                <div class="flex items-center justify-between border-b border-white/10 pb-2">
                    <span class="text-white font-bold tracking-widest text-[9px]">SYSTEM MONITOR</span>
                    <span class="flex h-2 w-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e] animate-pulse"></span>
                </div>
                <div class="grid grid-cols-1 gap-2">
                    <div class="flex justify-between gap-4">
                        <span class="opacity-40 uppercase">Epoch Time</span>
                        <span id="telemetry-date" class="text-white">---</span>
                    </div>
                    <div class="flex justify-between gap-4">
                        <span class="opacity-40 uppercase">Solar Velocity</span>
                        <span id="telemetry-wind" class="text-blue-300">420 km/s</span>
                    </div>
                    <div class="flex justify-between gap-4">
                        <span class="opacity-40 uppercase">Solar State</span>
                        <span id="telemetry-cme" class="text-green-400 font-bold uppercase">Nominal</span>
                    </div>
                    <div class="mt-3 pt-3 border-t border-white/10 flex flex-col">
                        <span class="opacity-30 text-[8px] tracking-widest">REAL-TIME COORDS (X/Z)</span>
                        <span id="target-coords" class="text-yellow-500/90 font-mono mt-1 text-[11px]">X: 0.000 | Z: 0.000</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full md:w-auto md:top-40 md:bottom-auto md:left-8 p-4 pointer-events-auto">
            <div id="planet-list-container" class="glass rounded-3xl p-3 md:w-72 max-h-[18vh] md:max-h-[55vh] overflow-x-auto md:overflow-x-hidden md:overflow-y-auto">
                <div id="planet-list" class="flex flex-row md:flex-col gap-2 min-w-max md:min-w-0">
                    </div>
            </div>
        </div>

        <div id="info-panel" class="absolute pointer-events-auto">
            <div class="glass rounded-[2.5rem] p-8 md:p-10 shadow-2xl border-t border-white/15">
                <div class="flex items-center justify-between mb-6">
                    <h2 id="info-name" class="text-3xl md:text-4xl font-bold text-white tracking-tight">Sol</h2>
                    <span id="info-type" class="text-[9px] font-bold tracking-widest px-3 py-1.5 rounded-full border uppercase">Type_Star</span> 
                </div>
                
                <p id="info-desc" class="text-gray-400 text-xs md:text-sm leading-relaxed mb-8 font-light line-clamp-3 md:line-clamp-none"></p>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/[0.03] p-4 rounded-2xl border border-white/5">
                        <span class="block text-gray-500 mb-1 uppercase tracking-widest text-[8px]">Mean Distance</span>
                        <span id="info-dist" class="block text-white font-mono text-base">-</span>
                    </div>
                    <div class="bg-white/[0.03] p-4 rounded-2xl border border-white/5">
                        <span class="block text-gray-500 mb-1 uppercase tracking-widest text-[8px]">Orbital Cycle</span>
                        <span id="info-year" class="block text-white font-mono text-base">-</span>
                    </div>
                </div>
                
                <button id="reset-cam" class="mt-8 w-full bg-white/5 hover:bg-white/15 text-white py-4 rounded-2xl border border-white/10 transition-all text-[10px] uppercase tracking-[0.4em] font-bold active:scale-95">
                    Return to Overview
                </button>
            </div>
        </div>

        <div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 flex items-center gap-8 bg-black/80 backdrop-blur-3xl px-10 py-5 rounded-[2rem] border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] pointer-events-auto">
            <div class="flex items-center gap-6">
                <button id="btn-rewind" class="text-gray-400 hover:text-white transition-all scale-125 active:scale-90">⏪</button>
                <button id="btn-pause" class="text-white hover:text-blue-400 transition-all text-3xl">⏸</button>
                <button id="btn-forward" class="text-gray-400 hover:text-white transition-all scale-125 active:scale-90">⏩</button>
            </div>
            <div class="h-10 w-[1px] bg-white/10"></div>
            <div class="flex flex-col min-w-[120px]">
                <span class="text-[9px] uppercase tracking-[0.25em] text-gray-500 font-bold mb-1">Clock Scalar</span>
                <span id="speed-display" class="font-mono text-blue-400 text-sm font-bold">1.0x (LIVE)</span>
            </div>
        </div>
    </div>

    <div id="loader-overlay" class="fixed inset-0 z-[100] bg-[#020205] flex flex-col items-center justify-center">
        <div class="relative mb-14">
            <div class="w-40 h-40 border border-indigo-500/10 rounded-full animate-[spin_8s_linear_infinite]"></div>
            <div class="absolute inset-0 w-40 h-40 border-t-2 border-indigo-500 rounded-full animate-[spin_1.5s_cubic-bezier(0.5,0.1,0.4,0.9)_infinite]"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-2.5 h-2.5 bg-white rounded-full shadow-[0_0_30px_white] animate-pulse"></div>
            </div>
        </div>
        <h2 class="text-white font-mono tracking-[0.6em] text-[11px] uppercase opacity-60">Synchronizing Local Group</h2>
        <div class="mt-8 w-72 h-[3px] bg-white/5 rounded-full overflow-hidden">
            <div id="progress-bar" class="w-0 h-full bg-indigo-500 transition-all duration-700 shadow-[0_0_20px_#6366f1]"></div>
        </div>
        <p id="loader-status" class="text-[9px] text-indigo-300/40 font-mono mt-6 uppercase tracking-[0.3em]">Querying NASA Horizons API...</p>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
